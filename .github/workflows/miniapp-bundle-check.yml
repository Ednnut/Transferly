name: MiniApp Bundle Budget Check

on:
  pull_request:
    paths:
      - 'miniapp/**'
  push:
    branches: [ main ]
    paths:
      - 'miniapp/**'

jobs:
  check-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install root dependencies
        run: npm ci

      - name: Build miniapp
        run: npm run build --prefix miniapp

      - name: Check miniapp bundle budgets
        run: node scripts/check-miniapp-bundle-budget.js

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miniapp-dist
          path: miniapp/dist
